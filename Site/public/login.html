<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Vision Score</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="./assets/imgs/logo_branca.png" type="image/x-icon">
</head>

<div class="mascara"></div>

<body>
    <img src="./assets/imgs/logo_branca.png" alt="Logo Vision Score">

    <h1>Vision Score</h1>

    <form>
        <div class="container-texto">
            <h2>Bem-vindo, Treinador</h2>
            <p>Acesse seu sistema e faça sua preparação pré-jogo!</p>
        </div>

        <div class="input-container">
            <div class="input-flutuante">
                <input type="email" placeholder="" id="input-email" autocomplete="off">

                <label for="input-email">E-mail</label>
            </div>

            <div class="input-flutuante">
                <input type="password" placeholder="" id="input-senha">

                <i class="fa-solid fa-eye icone-senha" id="password-icone"></i>
                <i class="fa-solid fa-eye-slash icone-senha" id="text-icone"></i>

                <label for="input-senha">Senha</label>
            </div>
        </div>

        <div class="container-botao">
            <button type="button" id="btn-login">Acessar Conta</button>

            <a href="./recuperacao-senha.html">Esqueceu a senha?</a>
        </div>

        <a href="./index.html" class="link-voltar">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar para o site institucional
        </a>
    </form>
</body>

</html>
<script src="./js/login.js"></script>
