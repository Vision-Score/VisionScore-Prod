<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <link rel="stylesheet" href="../css/dashboards.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="../css/editar-contas.css">

<body>
    <div class="main">
        <div id="sidebarContainer">

        <div class="header">

                        </div>

                    </div>
                </div>
                <div class="editar-contas-content">

                        <div id="id">Id</div>
                        <div id="foto">Foto</div>
                        <div id="nome">Nome</div>
                        <div id="equipe">Equipe</div>
                        <div id="status">Status</div>
                        <div id="acoes">Ações</div>
                    </div>
                    <div class="editar-contas-user-list">
                        <div class="editar-contas-user">
                            <div class="id">1</div>
                            <div class="foto"><img src="../assets/playerIcons/faker.png" alt=""></div>
                            <div class="nome">Faker</div>
                            <div class="equipe">T1</div>
                            <div class="status">Ativo</div>
                            <div class="acoes">
                                <button>Editar</button>
                                <button>Excluir</button>
                            </div>
                        </div>
                        <div class="editar-contas-user">
                            <div class="id">1</div>

                            <div class="nome">Faker</div>
                            <div class="equipe">T1</div>
                            <div class="status">Ativo</div>
                            <div class="acoes">
                                <button>Editar</button>
                                <button>Excluir</button>
                            </div>
                        </div>
                        <div class="editar-contas-user">
                            <div class="id">1</div>
                            <div class="foto"><img src="../assets/playerIcons/faker.png" alt=""></div>
                            <div class="nome">Faker</div>
                            <div class="equipe">T1</div>
                            <div class="status">Ativo</div>
                            <div class="acoes">
                                <button>Editar</button>
                                <button>Excluir</button>
                            </div>
                        </div>
                        <div class="editar-contas-user">
                            <div class="id">1</div>
                            <div class="foto"><img src="../assets/playerIcons/faker.png" alt=""></div>
                            <div class="nome">Faker</div>
                            <div class="equipe">T1</div>
                            <div class="status">Ativo</div>
                            <div class="acoes">
                                <button>Editar</button>
                                <button>Excluir</button>
                            </div>
                        </div>
                        <div class="editar-contas-user">
                            <div class="id">1</div>
                            <div class="foto"><img src="../assets/playerIcons/faker.png" alt=""></div>
                            <div class="nome">Faker</div>
                            <div class="equipe">T1</div>
                            <div class="status">Ativo</div>
                            <div class="acoes">
                                <button>Editar</button>
                                <button>Excluir</button>
                            </div>
                        </div>
                    </div>
                    <div class="editar-contas-pagination">
                        <div class="editar-contas-pagination-item active">1</div>
                        <div class="editar-contas-pagination-item">2</div>
                        <div class="editar-contas-pagination-item">3</div>
                    </div>
                </div>
            </div>
        </div>

</html>

<script>
    renderSidebar(document.getElementById("sidebarContainer"), "", {
        name: "Mitohara",
        role: "Coach",
        imageUrl: "../assets/playerIcons/faker.png",
        nameTeam: "T1",
        logoUrl: "../assets/icons/t1logo.png"
    });

    function switchSidebar() {
        document.getElementById("sbBackdrop").classList.toggle("sb-hidden");
