<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Vision Score</title>
  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=progress_activity" />
</head>

<body>
  <div class="loader">
    <span class="material-symbols-outlined">
      progress_activity
    </span>
  </div>
  <a href="./index.html" id="link-voltar">
    <i class="fa-solid fa-arrow-left"></i>
    Voltar
  </a>

  <div class="container-cadastro">
    <div class="logo"><img src="assets/imgs/logo_branca.png"></div>
    <h2 class="subtitulo">Crie sua conta!</h2>
    <div class="form">
      <input type="text" placeholder="Nome" id="input-nome">
      <input type="text" placeholder="Telefone" id="input-telefone">
    </div>
    <div class="form">
      <input type="text" placeholder="Email" id="input-email">
      <input type="text" placeholder="Senha" id="input-senha">
    </div>
    <div class="form">
      <input type="text" placeholder="Cód. Equipe" id="input-empresa">
    </div>
    <button id="btn-cadastrar">Cadastrar</button>
    <a href="./login.html">Já tem conta?</a>
  </div>

  <script src="./js/cadastro.js"></script>
</body>

</html>
